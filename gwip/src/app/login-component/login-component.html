
<form #loginForm='ngForm' (ngSubmit)='doLogin(loginForm)'>
    <div class='dashboard-wrapper'>
        <!-- LOGIN -->

        <div id='loginSection' class='login-box'>
            <h1>GOD'S WILL INTERNATIONAL PLACEMENT, INC</h1>
            <p class='subtitle'>Medical Professionals Application Form</p>

            <h2>Admin Login</h2>

            <input id='username' placeholder='Username' name='username' required />

            <input id='password' type='password' placeholder='Password' name='password' required />

            <button type='submit' class='btnlogin' id='btnLogin'>LOGIN</button>
        </div>


    </div>

</form>

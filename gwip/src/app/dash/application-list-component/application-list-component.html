<p class='subtitle' style='text-align:left;'>Submitted Medical Professionals Application Forms</p>

<input type='text' id='searchName' onkeyup='searchByName(event)' placeholder='Search by Name' />&nbsp;&nbsp;
<input type='text' id='filterJob' onkeyup='searchByJobCategory(event)' placeholder='Filter by Job Category' />

<table class='apply-table'>
    <thead>
        <tr>
            <th>#</th>
            <th></th>
            <th>Date Applied</th>
            <th>Name</th>
            <th>Age</th>
            <th>Job Category</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for(app of applications; track $index; let i = $index){
        <tr>
            <td>{{i+1}}</td>
            <td></td>
            <td>{{app.date_applied | date:'MM/dd/yyyy'}}</td>
            <td>{{app.name}}</td>
            <td>{{app.age}}</td>
            <td>{{app.job_category}}</td>
            <td></td>
        </tr>
        }
    </tbody>
</table>

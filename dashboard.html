

<!doctype html>
<html lang="en">

<head>

    <title>Admin Panel</title>
    <link rel="stylesheet" href="./assets/css/dashboard.css" />
</head>

<body>

    <div class="dashboard-wrapper">

            <table class='apply-table'>

                    </tr>

                </tbody>

   <script src="./assets/js/dashboard.js"></script>
